file-compressor:
  inbox:
    path: ./data/inbox
    poll-interval-ms: 60000        # Fallback directory scan frequency
    max-file-size-mb: 100
  outbox:
    path: ./data/outbox
  processed:
    path: ./data/processed
  dlq:
    path: ./data/dlq
  queue:
    capacity: 500
  algorithm:
    default: ZSTD
    size-threshold-kb: 10          # Files smaller than this default to GZIP

spring:
  datasource:
    url: jdbc:h2:file:./data/db/compressordb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: user
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
